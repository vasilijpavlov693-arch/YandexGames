<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Башня Ада</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; overflow: hidden; font-family: Arial, sans-serif; }
    canvas { display: block; }
    #hud { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); color: #fff; font-size: 20px; text-shadow: 0 0 10px #0ff; z-index: 10; text-align: center; }
    #menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; }
    #menu h1 { color: #f0f; font-size: 48px; margin-bottom: 30px; text-shadow: 0 0 30px #f0f; }
    #menu button { padding: 15px 50px; font-size: 20px; background: #f0f; color: #fff; border: none; border-radius: 8px; cursor: pointer; margin: 5px; }
    #menu button:hover { background: #f5a; }
    #death { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 20; }
    #death h2 { color: #f44; font-size: 36px; margin-bottom: 20px; }
    #death p { color: #fff; font-size: 18px; margin: 5px; }
    #death button { padding: 12px 40px; font-size: 18px; background: #f0f; color: #fff; border: none; border-radius: 8px; cursor: pointer; margin: 5px; }
    .hint { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.4); font-size: 12px; z-index: 10; }
  </style>
</head>
<body>
  <div id="hud" style="display:none">Этаж: <span id="floor">1</span></div>
  <div id="menu"><h1>БАШНЯ АДА</h1><button onclick="startGame()">ИГРАТЬ</button></div>
  <div id="death"><h2>ТЫ ПОГИБ!</h2><p>Этаж: <span id="dFloor">1</span></p><button onclick="restartGame()">РЕСТАРТ</button><button onclick="goMenu()">МЕНЮ</button></div>
  <div class="hint">WASD — движение | Пробел — прыжок | ЛКМ — камера</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // === GAME STATE ===
    let scene, camera, renderer, clock;
    let player, platforms = [], crystals = [], decorations = [];
    let velocity = new THREE.Vector3();
    let onGround = false, alive = true;
    let currentFloor = 1, crystalsEarned = 0;
    let cameraAngleX = 0, cameraAngleY = 0.3;
    let gameState = 'menu'; // menu, playing, dead
    const keys = {};

    // === CONFIG ===
    const GRAVITY = 28;
    const JUMP_FORCE = 13;
    const MOVE_SPEED = 8;
    const FLOOR_HEIGHT = 8;
    const CAM_DIST = 12;
    const CAM_HEIGHT = 5;
    const CAM_SPEED = 20;
    const MOUSE_SENSITIVITY = 0.002;

    // === INIT ===
    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0a0a1a);
      scene.fog = new THREE.FogExp2(0x0a0a1a, 0.006);

      camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 200);
      camera.position.set(0, 5, CAM_DIST);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(innerWidth, innerHeight);
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);

      clock = new THREE.Clock();

      // Lights
      scene.add(new THREE.AmbientLight(0x444466, 0.8));
      const dir = new THREE.DirectionalLight(0xffffff, 1.0);
      dir.position.set(10, 20, 10);
      scene.add(dir);
      const pl = new THREE.PointLight(0x00e5ff, 1.5, 40);
      pl.position.set(0, 20, 0);
      scene.add(pl);

      // Player
      player = new THREE.Mesh(
        new THREE.CylinderGeometry(0.3, 0.3, 0.8, 8),
        new THREE.MeshPhongMaterial({ color: 0xff0040, emissive: 0xff2060, emissiveIntensity: 0.5 })
      );
      const head = new THREE.Mesh(
        new THREE.SphereGeometry(0.25, 8, 8),
        new THREE.MeshPhongMaterial({ color: 0xff0040, emissive: 0xff2060, emissiveIntensity: 0.5 })
      );
      head.position.y = 0.55;
      player.add(head);
      player.position.set(0, 2, 0);
      scene.add(player);

      // Lights around player
      const pLight = new THREE.PointLight(0xff0040, 1.0, 10);
      player.add(pLight);

      window.addEventListener('resize', () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
      });

      window.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
      window.addEventListener('keyup', e => { keys[e.code] = false; });

      // Pointer lock for mouse camera
      renderer.domElement.addEventListener('click', () => {
        if (gameState === 'playing') {
          renderer.domElement.requestPointerLock();
        }
      });
      document.addEventListener('pointerlockchange', () => {});
      document.addEventListener('mousemove', e => {
        if (document.pointerLockElement === renderer.domElement && gameState === 'playing') {
          cameraAngleX -= e.movementX * MOUSE_SENSITIVITY;
          cameraAngleY = Math.max(-0.5, Math.min(0.8, cameraAngleY - e.movementY * MOUSE_SENSITIVITY));
        }
      });

      animate();
    }

    // === GENERATE TOWER ===
    // Max jump physics
    const MAX_JUMP_HEIGHT = (JUMP_FORCE * JUMP_FORCE) / (2 * GRAVITY); // ≈ 3.0
    const MAX_JUMP_TIME = (2 * JUMP_FORCE) / GRAVITY; // ≈ 0.93s
    const MAX_HORIZONTAL = MOVE_SPEED * MAX_JUMP_TIME; // ≈ 7.4

    function isReachable(fromX, fromY, fromZ, toX, toY, toZ) {
      const dx = Math.abs(toX - fromX);
      const dz = Math.abs(toZ - fromZ);
      const dy = toY - fromY;
      const hDist = Math.sqrt(dx * dx + dz * dz);
      // Strict: max 60% of jump height, max 50% of horizontal reach
      return dy <= MAX_JUMP_HEIGHT * 0.6 && hDist <= MAX_HORIZONTAL * 0.5;
    }

    function generateFloor(y, index) {
      const difficulty = Math.min(index / 8, 1);
      const group = [];

      // Base platform (always at origin for first floor, or near previous platform)
      const baseX = index === 0 ? 0 : (Math.random() - 0.5) * 4;
      const baseZ = index === 0 ? 0 : (Math.random() - 0.5) * 2;
      const plat = createPlatform(baseX, y, baseZ, 5, 0x2244aa);
      group.push(plat);

      // Generate obstacles that are reachable from each other
      let lastX = baseX, lastY = y, lastZ = baseZ;
      const count = 2 + Math.floor(difficulty * 2);

      for (let i = 0; i < count; i++) {
        let attempts = 0;
        let ox, oy, oz;

        // Keep trying until we find a reachable position
        do {
          const angle = (i / count) * Math.PI * 2 + index * 0.7 + (Math.random() - 0.5) * 0.8;
          const r = 2 + Math.random() * 3;
          ox = lastX + Math.cos(angle) * r;
          oz = lastZ + Math.sin(angle) * r * 0.6;
          oy = lastY + 2 + Math.random() * 2; // Step up 2-4 units
          attempts++;
        } while (!isReachable(lastX, lastY, lastZ, ox, oy, oz) && attempts < 20);

        // If still not reachable after 20 tries, force it to be reachable
        if (!isReachable(lastX, lastY, lastZ, ox, oy, oz)) {
          const angle = Math.random() * Math.PI * 2;
          ox = lastX + Math.cos(angle) * 2;
          oz = lastZ + Math.sin(angle) * 1.5;
          oy = lastY + 2;
        }

        if (difficulty > 0.3 && Math.random() < 0.3) {
          group.push(createBeam(ox, oy, oz));
        } else if (difficulty > 0.2 && Math.random() < 0.3) {
          group.push(createPlatform(ox, oy, oz, 2, 0x9944ff, true));
        } else {
          group.push(createPlatform(ox, oy, oz, 2 + Math.random() * 2, 0x3355bb));
        }

        lastX = ox; lastY = oy; lastZ = oz;
      }

      // Crystal
      if (index > 0 && Math.random() > 0.5) {
        const cx = (Math.random() - 0.5) * 6;
        const cy = y + FLOOR_HEIGHT * 0.5;
        const cz = (Math.random() - 0.5) * 4;
        const crystal = createCrystal(cx, cy, cz);
        group.push(crystal);
      }

      return group;
    }

    function createPlatform(x, y, z, size, color, moving) {
      const geo = new THREE.BoxGeometry(size, 0.4, 2);
      const mat = new THREE.MeshPhongMaterial({ color, emissive: color, emissiveIntensity: 0.3 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(x, y, z);
      mesh.receiveShadow = true;
      scene.add(mesh);

      // Edge glow
      const edges = new THREE.LineSegments(
        new THREE.EdgesGeometry(geo),
        new THREE.LineBasicMaterial({ color: 0x00e5ff, transparent: true, opacity: 0.6 })
      );
      mesh.add(edges);

      return { mesh, moving, startX: x, startZ: z, time: Math.random() * Math.PI * 2, active: true, lastX: x, lastZ: z };
    }

    function createBeam(x, y, z) {
      const group = new THREE.Group();
      const geo = new THREE.BoxGeometry(4, 0.3, 0.5);
      const mat = new THREE.MeshPhongMaterial({ color: 0x00e5ff, emissive: 0x00e5ff, emissiveIntensity: 0.6 });
      const beam = new THREE.Mesh(geo, mat);
      beam.castShadow = true;
      group.add(beam);
      const pivot = new THREE.Mesh(
        new THREE.SphereGeometry(0.2, 8, 8),
        new THREE.MeshPhongMaterial({ color: 0xff0040, emissive: 0xff0040, emissiveIntensity: 0.8 })
      );
      group.add(pivot);
      group.position.set(x, y, z);
      scene.add(group);
      return { mesh: group, beam, type: 'beam', speed: 2 + Math.random() * 2, active: true, lastX: x, lastZ: z };
    }

    function createCrystal(x, y, z) {
      const geo = new THREE.OctahedronGeometry(0.3);
      const mat = new THREE.MeshPhongMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 0.8, transparent: true, opacity: 0.9 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(x, y, z);
      scene.add(mesh);
      const glow = new THREE.Mesh(
        new THREE.SphereGeometry(0.5, 8, 8),
        new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.15 })
      );
      mesh.add(glow);
      return { mesh, type: 'crystal', collected: false };
    }

    function buildTower() {
      // Clear old
      platforms.forEach(p => scene.remove(p.mesh));
      crystals.forEach(c => scene.remove(c.mesh));
      decorations.forEach(d => scene.remove(d.mesh));
      platforms = []; crystals = []; decorations = [];

      // Ground
      const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(30, 30),
        new THREE.MeshBasicMaterial({ color: 0x111122, side: THREE.DoubleSide })
      );
      ground.rotation.x = -Math.PI / 2;
      ground.position.y = -0.5;
      scene.add(ground);
      decorations.push(ground);

      const grid = new THREE.GridHelper(30, 15, 0x00e5ff, 0x003344);
      grid.position.y = -0.49;
      scene.add(grid);
      decorations.push(grid);

      // Generate 8 floors
      for (let i = 0; i < 8; i++) {
        const items = generateFloor(i * FLOOR_HEIGHT, i);
        items.forEach(item => {
          if (item.type === 'crystal') crystals.push(item);
          else platforms.push(item);
        });
      }
    }

    // === GAME LOGIC ===
    function startGame() {
      document.getElementById('menu').style.display = 'none';
      document.getElementById('death').style.display = 'none';
      document.getElementById('hud').style.display = 'block';
      gameState = 'playing';
      currentFloor = 1;
      crystalsEarned = 0;
      alive = true;
      onGround = false;
      velocity.set(0, 0, 0);
      player.position.set(0, 2, 0);
      player.visible = true;
      player.alive = true;
      cameraAngleX = 0;
      cameraAngleY = 0.3;
      buildTower();
    }

    function restartGame() { startGame(); }
    function goMenu() {
      gameState = 'menu';
      document.exitPointerLock();
      document.getElementById('menu').style.display = 'flex';
      document.getElementById('death').style.display = 'none';
      document.getElementById('hud').style.display = 'none';
    }

    function die() {
      if (!alive) return;
      alive = false;
      player.visible = false;
      document.exitPointerLock();
      document.getElementById('dFloor').textContent = currentFloor;
      setTimeout(() => {
        document.getElementById('death').style.display = 'flex';
      }, 500);
    }

    // === UPDATE ===
    function updatePlayer(dt) {
      if (!alive) return;

      let mx = 0, mz = 0;
      if (keys['KeyA'] || keys['ArrowLeft']) mx = -1;
      if (keys['KeyD'] || keys['ArrowRight']) mx = 1;
      if (keys['KeyW'] || keys['ArrowUp']) mz = -1;
      if (keys['KeyS'] || keys['ArrowDown']) mz = 1;

      // Rotate by camera
      const cos = Math.cos(cameraAngleX), sin = Math.sin(cameraAngleX);
      velocity.x = (mx * cos + mz * sin) * MOVE_SPEED;
      velocity.z = (-mx * sin + mz * cos) * MOVE_SPEED;

      velocity.y -= GRAVITY * dt;

      // Jump
      if (keys['Space'] && onGround) {
        velocity.y = JUMP_FORCE;
        onGround = false;
      }

      player.position.x += velocity.x * dt;
      player.position.y += velocity.y * dt;
      player.position.z += velocity.z * dt;

      // Fall death
      if (player.position.y < -10) die();

      // Update floor
      const newFloor = Math.floor(player.position.y / FLOOR_HEIGHT) + 1;
      if (newFloor > currentFloor) {
        currentFloor = newFloor;
        document.getElementById('floor').textContent = currentFloor;
        // Generate more floors if needed
        const topY = (platforms.length > 0 ? Math.max(...platforms.map(p => p.mesh.position.y)) : 0);
        if (player.position.y > topY - FLOOR_HEIGHT * 3) {
          const idx = Math.floor(topY / FLOOR_HEIGHT) + 1;
          const items = generateFloor(idx * FLOOR_HEIGHT, idx);
          items.forEach(item => {
            if (item.type === 'crystal') crystals.push(item);
            else platforms.push(item);
          });
        }
      }

      // Collect crystals
      crystals.forEach(c => {
        if (!c.collected && player.position.distanceTo(c.mesh.position) < 1.2) {
          c.collected = true;
          c.mesh.visible = false;
          crystalsEarned++;
        }
      });
    }

    function checkCollisions() {
      if (!alive) return;
      onGround = false;
      let standingPlatform = null;

      const px = player.position.x, py = player.position.y, pz = player.position.z;
      const pr = 0.35;
      const playerBottom = py - pr;
      const playerTop = py + pr;
      const playerSpeedY = velocity.y;

      platforms.forEach(p => {
        if (!p.active) return;

        if (p.type === 'beam' && p.beam) {
          // Beam collision - use group position + beam rotation
          const gx = p.mesh.position.x, gy = p.mesh.position.y, gz = p.mesh.position.z;
          const angle = p.beam.rotation.y;
          const cos = Math.cos(angle), sin = Math.sin(angle);

          // Transform player position to beam-local space
          const dx = px - gx;
          const dz = pz - gz;
          const localX = dx * cos + dz * sin;
          const localZ = -dx * sin + dz * cos;

          // Beam local bounds: X = ±2 (length), Z = ±0.25 (depth), Y within beam height
          if (Math.abs(localX) < 2.0 && Math.abs(localZ) < 0.5 &&
              playerBottom < gy + 0.4 && playerTop > gy - 0.1 &&
              playerSpeedY <= 0) {
            onGround = true;
            standingPlatform = p;
            velocity.y = 0;
            player.position.y = gy + 0.35;
          }
        } else {
          // Regular platform collision
          const ox = p.mesh.position.x;
          const oy = p.mesh.position.y;
          const oz = p.mesh.position.z;
          const hw = p.mesh.geometry.parameters.width / 2;
          const hd = p.mesh.geometry.parameters.depth / 2;
          const hh = 0.2;

          const inX = px > ox - hw && px < ox + hw;
          const inZ = pz > oz - hd && pz < oz + hd;
          const overlapY = playerBottom < oy + hh && playerTop > oy - hh;

          if (inX && inZ && overlapY) {
            if (playerBottom > oy && playerSpeedY <= 0) {
              // Land on top
              onGround = true;
              standingPlatform = p;
              velocity.y = 0;
              player.position.y = oy + hh + pr;
            } else if (playerTop < oy) {
              // Hit from below
              player.position.y = oy - hh - pr;
              velocity.y = Math.min(velocity.y, 0);
            } else if (px < ox) {
              player.position.x = ox - hw - pr;
              velocity.x = Math.min(velocity.x, 0);
            } else if (px > ox) {
              player.position.x = ox + hw + pr;
              velocity.x = Math.max(velocity.x, 0);
            } else if (pz < oz) {
              player.position.z = oz - hd - pr;
              velocity.z = Math.min(velocity.z, 0);
            } else if (pz > oz) {
              player.position.z = oz + hd + pr;
              velocity.z = Math.max(velocity.z, 0);
            }
          }
        }
      });

      // Platform attachment - move with platform
      if (standingPlatform && standingPlatform.moving) {
        const ox = standingPlatform.mesh.position.x;
        const oz = standingPlatform.mesh.position.z;
        // Calculate platform delta from last frame
        if (standingPlatform.lastX !== undefined) {
          const dx = ox - standingPlatform.lastX;
          const dz = oz - standingPlatform.lastZ;
          player.position.x += dx;
          player.position.z += dz;
        }
        standingPlatform.lastX = ox;
        standingPlatform.lastZ = oz;
      }
    }

    function updateCamera(dt) {
      if (gameState !== 'playing') return;

      const px = player.position.x, py = player.position.y, pz = player.position.z;

      // FPS camera orbit around player
      const cx = px + Math.sin(cameraAngleX) * CAM_DIST;
      const cz = pz + Math.cos(cameraAngleX) * CAM_DIST;
      const cy = py + CAM_HEIGHT + Math.sin(cameraAngleY) * 5;

      camera.position.set(cx, cy, cz);
      camera.lookAt(px, py + 1.5, pz);
    }

    function updateObstacles(dt) {
      platforms.forEach(p => {
        if (p.moving) {
          p.time += dt * 2;
          p.mesh.position.x = p.startX + Math.sin(p.time) * 3;
        }
        if (p.type === 'beam' && p.beam) {
          p.beam.rotation.y += p.speed * dt;
        }
      });
      crystals.forEach(c => {
        if (!c.collected) {
          c.mesh.rotation.y += dt * 2;
          c.mesh.position.y += Math.sin(Date.now() * 0.003) * 0.002;
        }
      });
    }

    // === RENDER LOOP ===
    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.05);

      if (gameState === 'playing') {
        updatePlayer(dt);
        checkCollisions();
        updateObstacles(dt);
      }
      updateCamera(dt);

      renderer.render(scene, camera);
    }

    init();
  </script>
</body>
</html>
